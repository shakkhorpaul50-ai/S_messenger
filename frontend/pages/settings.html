<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Messenger</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div id="app">
    <div class="settings-page">
      <div class="settings-header">
        <a href="chat.html" class="btn btn-secondary">Back</a>
        <h1>Settings</h1>
      </div>
      <div class="settings-content">
        <section class="settings-section">
          <h2>Profile</h2>
          <form id="profileForm">
            <div class="form-group">
              <label for="settingsDisplayName">Display Name</label>
              <input type="text" id="settingsDisplayName" name="displayName" required>
            </div>
            <div class="form-group">
              <label for="settingsAvatar">Avatar URL</label>
              <input type="url" id="settingsAvatar" name="avatar" placeholder="https://example.com/avatar.jpg">
            </div>
            <button type="submit" class="btn btn-primary">Save Profile</button>
          </form>
        </section>
        <section class="settings-section">
          <h2>Notifications</h2>
          <div class="settings-option">
            <label>
              <input type="checkbox" id="notifyMessages" checked>
              Message notifications
            </label>
          </div>
          <div class="settings-option">
            <label>
              <input type="checkbox" id="notifySounds" checked>
              Sound notifications
            </label>
          </div>
          <div class="settings-option">
            <label>
              <input type="checkbox" id="notifyPreview" checked>
              Message preview
            </label>
          </div>
        </section>
        <section class="settings-section">
          <h2>Account</h2>
          <button id="deleteAccountBtn" class="btn btn-danger">Delete Account</button>
        </section>
      </div>
    </div>
  </div>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
