<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messenger</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/chat.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div id="app">
    <div class="chat-layout">
      <aside class="conversations-sidebar">
        <div class="sidebar-header">
          <h2>Chats</h2>
          <div class="sidebar-actions">
            <a href="contacts.html" class="btn-icon" title="Contacts">+</a>
            <a href="settings.html" class="btn-icon" title="Settings">&#9881;</a>
            <button id="logoutBtn" class="btn-icon" title="Logout">&#10005;</button>
          </div>
        </div>
        <div class="sidebar-search">
          <input type="text" id="conversationSearch" placeholder="Search conversations...">
        </div>
        <div class="conversation-list" id="conversationList"></div>
      </aside>
      <main class="chat-main">
        <div class="chat-header" id="chatHeader">
          <div class="chat-header-info">
            <h3 id="currentConversationName">Select a conversation</h3>
          </div>
          <div class="chat-header-actions">
            <button id="toggleSidebar" class="btn-icon">&#9776;</button>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="empty-state" id="emptyState">
            <p>Select a conversation to start chatting</p>
          </div>
        </div>
        <div class="typing-indicator" id="typingIndicator"></div>
        <div class="message-input-area">
          <div class="message-input-wrapper">
            <input type="text" id="messageInput" class="message-input" placeholder="Type a message..." disabled>
            <button id="sendButton" class="btn btn-primary" disabled>Send</button>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/websocket.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/contacts.js"></script>
  <script src="../js/chat.js"></script>
</body>
</html>
